groups:
  - name: go-template-alerts
    rules:
      # High error rate alert (5xx responses > 5% of total requests)
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(go_template_http_requests_total{status=~"5.."}[5m]))
            /
            sum(rate(go_template_http_requests_total[5m]))
          ) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      # Slow response times (p99 > 1 second)
      - alert: SlowResponseTime
        expr: |
          histogram_quantile(0.99,
            sum(rate(go_template_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow API response times detected"
          description: "99th percentile response time is {{ $value | humanizeDuration }}"

      # Very slow response times (p99 > 5 seconds)
      - alert: VerySlowResponseTime
        expr: |
          histogram_quantile(0.99,
            sum(rate(go_template_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical API response times detected"
          description: "99th percentile response time is {{ $value | humanizeDuration }}"

      # Database connection pool exhaustion (> 80% of max connections used)
      - alert: DBConnectionPoolHigh
        expr: go_template_db_connections_open > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool usage high"
          description: "{{ $value }} connections open (threshold: 80)"

      # Database connection pool critical (> 95% of max connections used)
      - alert: DBConnectionPoolCritical
        expr: go_template_db_connections_open > 95
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "{{ $value }} connections open (threshold: 95)"

      # High authentication failure rate
      - alert: HighAuthFailureRate
        expr: sum(rate(go_template_auth_failures_total[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High authentication failure rate"
          description: "{{ $value | humanize }} auth failures per second"

      # Brute force attack detection (sustained auth failures)
      - alert: PossibleBruteForceAttack
        expr: sum(rate(go_template_auth_failures_total[1m])) > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Possible brute force attack detected"
          description: "{{ $value | humanize }} auth failures per second over 2 minutes"

      # High rate limit hits
      - alert: HighRateLimitHits
        expr: sum(rate(go_template_rate_limit_hits_total[5m])) by (tier) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High rate limit hits on {{ $labels.tier }} tier"
          description: "{{ $value | humanize }} rate limit hits per second"

      # API service down (no requests for 5 minutes)
      - alert: APIServiceDown
        expr: absent(go_template_http_requests_total) or sum(rate(go_template_http_requests_total[5m])) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API service appears to be down"
          description: "No HTTP requests received in the last 5 minutes"

      # High memory usage (Go heap > 500MB)
      - alert: HighMemoryUsage
        expr: go_memstats_heap_alloc_bytes > 500 * 1024 * 1024
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Heap allocation is {{ $value | humanize1024 }}B"

      # Too many goroutines (potential leak)
      - alert: TooManyGoroutines
        expr: go_goroutines > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Too many goroutines"
          description: "{{ $value }} goroutines running (threshold: 1000)"
