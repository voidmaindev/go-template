  # === HEALTH ===
  /health:
    get:
      tags:
        - Health
      summary: Combined health check
      description: |
        Combined health check endpoint (backward compatible).
        Returns detailed status of all dependencies.
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /healthz:
    get:
      tags:
        - Health
      summary: Liveness probe
      description: |
        Kubernetes liveness probe endpoint.
        Returns 200 if the application is alive and running.
        Use this for Kubernetes `livenessProbe` configuration.
      operationId: livenessCheck
      responses:
        '200':
          description: Application is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LivenessResponse'
        '503':
          description: Application is not responding
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LivenessResponse'

  /readyz:
    get:
      tags:
        - Health
      summary: Readiness probe
      description: |
        Kubernetes readiness probe endpoint.
        Returns 200 if the application is ready to serve traffic.
        Checks database, Redis, and other dependencies.
        Use this for Kubernetes `readinessProbe` configuration.
      operationId: readinessCheck
      responses:
        '200':
          description: Application is ready to serve traffic
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Application is not ready (dependencies unhealthy)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /metrics:
    get:
      tags:
        - Health
      summary: Prometheus metrics
      description: |
        Prometheus metrics endpoint.
        Returns application metrics in Prometheus text format.
        Use this for Prometheus scraping configuration.
      operationId: getMetrics
      responses:
        '200':
          description: Prometheus metrics in text format
          content:
            text/plain:
              schema:
                type: string
                example: |
                  # HELP http_requests_total Total HTTP requests
                  # TYPE http_requests_total counter
                  http_requests_total{method="GET",path="/api/v1/items",status="200"} 42
