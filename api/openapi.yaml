  # === DOCUMENTS ===
  /documents:
    get:
      tags:
        - Documents
      summary: List documents
      description: |
        Get paginated list of documents with filtering and sorting.

        Supports all dynamic filter operators on any field. See API description for filter syntax.

        **Example filters:**
        - `?code__contains=INV` - Documents with "INV" in code
        - `?created_at__gte=2024-01-01&created_at__lte=2024-12-31` - Created in 2024
        - `?city.country.name=Germany` - Documents for cities in Germany
        - `?total_amount__gte=10000` - Total amount >= $100
      operationId: listDocuments
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/OrderParam'
      responses:
        '200':
          description: List of documents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Documents
      summary: Create document
      description: Create a new document with items (admin only)
      operationId: createDocument
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
