openapi: 3.0.3
info:
  title: Go Template API
  description: |
    Production-ready Go backend template with JWT authentication, filtering, and pagination.

    ## Filtering

    All list endpoints support Django-style filtering via query parameters. Any field can be filtered using the following syntax:

    ```
    ?field=value              # Equality (default operator)
    ?field__operator=value    # Specific operator
    ```

    ### Supported Operators

    | Operator | Description | Example |
    |----------|-------------|---------|
    | `eq` | Equals (default) | `?name=Berlin` or `?name__eq=Berlin` |
    | `gt` | Greater than | `?price__gt=1000` |
    | `lt` | Less than | `?price__lt=5000` |
    | `gte` | Greater than or equal | `?created_at__gte=2024-01-01` |
    | `lte` | Less than or equal | `?price__lte=9999` |
    | `contains` | Contains substring (case-insensitive) | `?name__contains=new` |
    | `starts_with` | Starts with (case-insensitive) | `?name__starts_with=New` |
    | `ends_with` | Ends with (case-insensitive) | `?email__ends_with=@gmail.com` |
    | `in` | In list (comma-separated) | `?status__in=active,pending` |
    | `is_null` | Is null | `?deleted_at__is_null=true` |
    | `is_not_null` | Is not null | `?email__is_not_null=true` |

    ### Relation Filtering

    Filter on related entity fields using dot notation (one level deep):

    ```
    ?country.name__contains=Germany    # Filter cities by country name
    ?city.country.code=DEU             # Filter documents by city's country code
    ```

    ### Range Filtering

    Apply multiple filters on the same field for range queries:

    ```
    # Date range: items created in 2024
    ?created_at__gte=2024-01-01&created_at__lte=2024-12-31

    # Price range: items between $10 and $100
    ?price__gte=1000&price__lte=10000
    ```

    ## Sorting

    ```
    ?sort=field&order=asc     # Sort ascending (default)
    ?sort=field&order=desc    # Sort descending
    ```

    ## Pagination

    ```
    ?page=1&page_size=20      # Page 1, 20 items per page
    ```

    - Default page: 1
    - Default page_size: 10
    - Maximum page_size: 100
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3200/api/v1
    description: Development server

tags:
  - name: Auth
    description: Authentication endpoints (register, login, logout, refresh)
  - name: Users
    description: User management endpoints
  - name: Items
    description: Item CRUD operations
  - name: Countries
    description: Country CRUD operations
  - name: Cities
    description: City CRUD operations (with country relations)
  - name: Documents
    description: Document CRUD operations with line items
  - name: Health
    description: Health check endpoints

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token

  schemas:
    # Base response wrapper
    Response:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
        error:
          type: object

    # Error response
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        error:
          type: string

    # Pagination
    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
          format: int64
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer
        has_more:
          type: boolean

    # === Auth DTOs ===
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          example: password123
        name:
          type: string
          minLength: 2
          example: John Doe

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: password123

    RefreshTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/UserResponse'

    # === User DTOs ===
    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum:
            - user
            - admin
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2

    ChangePasswordRequest:
      type: object
      required:
        - current_password
        - new_password
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 8

    UserListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserResponse'
        total:
          type: integer
          format: int64
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer
        has_more:
          type: boolean

    # === Item DTOs ===
    ItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        price:
          type: integer
          description: Price in cents
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateItemRequest:
      type: object
      required:
        - name
        - price
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: integer
          minimum: 0
          description: Price in cents

    UpdateItemRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: integer
          minimum: 0

    ItemListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ItemResponse'
        total:
          type: integer
          format: int64
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer
        has_more:
          type: boolean

    # === Country DTOs ===
    CountryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        code:
          type: string
          description: 3-letter country code
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateCountryRequest:
      type: object
      required:
        - name
        - code
      properties:
        name:
          type: string
        code:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Za-z]{3}$'

    UpdateCountryRequest:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
          minLength: 3
          maxLength: 3

    CountryListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CountryResponse'
        total:
          type: integer
          format: int64
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer
        has_more:
          type: boolean

    # === City DTOs ===
    CityResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        country_id:
          type: integer
          format: int64
        country:
          $ref: '#/components/schemas/CountryResponse'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateCityRequest:
      type: object
      required:
        - name
        - country_id
      properties:
        name:
          type: string
        country_id:
          type: integer
          format: int64

    UpdateCityRequest:
      type: object
      properties:
        name:
          type: string
        country_id:
          type: integer
          format: int64

    CityListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CityResponse'
        total:
          type: integer
          format: int64
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer
        has_more:
          type: boolean

    # === Document DTOs ===
    DocumentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        city_id:
          type: integer
          format: int64
        city:
          $ref: '#/components/schemas/CityResponse'
        document_date:
          type: string
          format: date
        total_amount:
          type: integer
          description: Total amount in cents
        items:
          type: array
          items:
            $ref: '#/components/schemas/DocumentItemResponse'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    DocumentItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        document_id:
          type: integer
          format: int64
        item_id:
          type: integer
          format: int64
        item:
          $ref: '#/components/schemas/ItemResponse'
        quantity:
          type: integer
        price:
          type: integer
          description: Price in cents
        line_total:
          type: integer
          description: Line total in cents

    CreateDocumentRequest:
      type: object
      required:
        - code
        - city_id
        - document_date
      properties:
        code:
          type: string
        city_id:
          type: integer
          format: int64
        document_date:
          type: string
          format: date
        items:
          type: array
          items:
            $ref: '#/components/schemas/CreateDocumentItemRequest'

    CreateDocumentItemRequest:
      type: object
      required:
        - item_id
        - quantity
        - price
      properties:
        item_id:
          type: integer
          format: int64
        quantity:
          type: integer
          minimum: 1
        price:
          type: integer
          minimum: 0

    UpdateDocumentRequest:
      type: object
      properties:
        code:
          type: string
        city_id:
          type: integer
          format: int64
        document_date:
          type: string
          format: date

    UpdateDocumentItemRequest:
      type: object
      properties:
        quantity:
          type: integer
          minimum: 1
        price:
          type: integer
          minimum: 0

    DocumentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DocumentResponse'
        total:
          type: integer
          format: int64
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer
        has_more:
          type: boolean

    # === Health ===
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        database:
          type: string
          example: connected
        redis:
          type: string
          example: connected

  parameters:
    PageParam:
      name: page
      in: query
      description: Page number
      schema:
        type: integer
        default: 1
        minimum: 1
    PageSizeParam:
      name: page_size
      in: query
      description: Items per page
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 100
    SortParam:
      name: sort
      in: query
      description: Field to sort by
      schema:
        type: string
    OrderParam:
      name: order
      in: query
      description: Sort order
      schema:
        type: string
        enum:
          - asc
          - desc
        default: desc
    IdPathParam:
      name: id
      in: path
      required: true
      description: Resource ID
      schema:
        type: integer
        format: int64

paths:
  # === AUTH ===
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      description: Create a new user account and return authentication tokens
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login
      description: Authenticate user and return tokens
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token
      description: Get new access token using refresh token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout
      description: Invalidate current token
      operationId: logout
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logged out successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # === USERS ===
  /users/me:
    get:
      tags:
        - Users
      summary: Get current user
      description: Get the authenticated user's profile
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Users
      summary: Update current user
      description: Update the authenticated user's profile
      operationId: updateCurrentUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/password:
    put:
      tags:
        - Users
      summary: Change password
      description: Change the authenticated user's password
      operationId: changePassword
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed
        '400':
          description: Invalid current password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users:
    get:
      tags:
        - Users
      summary: List all users
      description: |
        Get paginated list of users (admin only).

        Supports all dynamic filter operators on any field. See API description for filter syntax.

        **Example filters:**
        - `?email__contains=@company.com` - Users with company email
        - `?name__starts_with=John` - Users whose name starts with John
        - `?role=admin` - Admin users only
        - `?created_at__gte=2024-01-01` - Users created after Jan 1, 2024
      operationId: listUsers
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/OrderParam'
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      description: Get user details by ID
      operationId: getUser
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Users
      summary: Delete user
      description: Delete user by ID
      operationId: deleteUser
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '204':
          description: User deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # === ITEMS ===
  /items:
    get:
      tags:
        - Items
      summary: List items
      description: |
        Get paginated list of items with filtering and sorting.

        Supports all dynamic filter operators on any field. See API description for filter syntax.

        **Example filters:**
        - `?name__contains=widget` - Items with "widget" in name
        - `?price__gte=1000&price__lte=5000` - Price range $10-$50
        - `?created_at__gte=2024-01-01` - Created after Jan 1, 2024
      operationId: listItems
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/OrderParam'
      responses:
        '200':
          description: List of items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Items
      summary: Create item
      description: Create a new item (admin only)
      operationId: createItem
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
      responses:
        '201':
          description: Item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /items/{id}:
    get:
      tags:
        - Items
      summary: Get item by ID
      description: Get item details by ID
      operationId: getItem
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Item found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Items
      summary: Update item
      description: Update item by ID (admin only)
      operationId: updateItem
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItemRequest'
      responses:
        '200':
          description: Item updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Items
      summary: Delete item
      description: Delete item by ID (admin only)
      operationId: deleteItem
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '204':
          description: Item deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # === COUNTRIES ===
  /countries:
    get:
      tags:
        - Countries
      summary: List countries
      description: |
        Get paginated list of countries with filtering and sorting.

        Supports all dynamic filter operators on any field. See API description for filter syntax.

        **Example filters:**
        - `?name__contains=united` - Countries with "united" in name
        - `?code=USA` - Country with code USA
      operationId: listCountries
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/OrderParam'
      responses:
        '200':
          description: List of countries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountryListResponse'
        '401':
          description: Unauthorized
