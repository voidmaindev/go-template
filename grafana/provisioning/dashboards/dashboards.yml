# yaml-language-server: $schema=
apiVersion: 1

providers:
  - name: 'Go Template Dashboards'
    orgId: 1
    folder: 'Go Application'
    folderUid: 'go-app'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
