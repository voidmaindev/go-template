services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-template-api
    ports:
      - "${SERVER_PORT:-3000}:3000"
    environment:
      # Application
      - APP_NAME=${APP_NAME:-go-template}
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      # Server
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=3000
      - SERVER_READ_TIMEOUT=${SERVER_READ_TIMEOUT:-10s}
      - SERVER_WRITE_TIMEOUT=${SERVER_WRITE_TIMEOUT:-10s}
      - SERVER_IDLE_TIMEOUT=${SERVER_IDLE_TIMEOUT:-120s}
      - SERVER_SHUTDOWN_TIMEOUT=${SERVER_SHUTDOWN_TIMEOUT:-30s}
      # Database
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-go-template}
      - DB_SSL_MODE=disable
      - DB_MAX_IDLE_CONNS=${DB_MAX_IDLE_CONNS:-10}
      - DB_MAX_OPEN_CONNS=${DB_MAX_OPEN_CONNS:-100}
      - DB_MAX_LIFETIME=${DB_MAX_LIFETIME:-1h}
      - DB_SLOW_QUERY_THRESHOLD=${DB_SLOW_QUERY_THRESHOLD:-200ms}
      - DB_RETRY_ATTEMPTS=${DB_RETRY_ATTEMPTS:-5}
      - DB_RETRY_DELAY=${DB_RETRY_DELAY:-5s}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=0
      - REDIS_RETRY_ATTEMPTS=${REDIS_RETRY_ATTEMPTS:-5}
      - REDIS_RETRY_DELAY=${REDIS_RETRY_DELAY:-5s}
      # JWT
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY:-15m}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY:-168h}
      - JWT_ISSUER=${JWT_ISSUER:-go-template}
      # Seeding (set SEED_ADMIN_PASSWORD in production via secrets/CI)
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-admin}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-}
      - SEED_ADMIN_NAME=${SEED_ADMIN_NAME:-Administrator}
      # Telemetry (OpenTelemetry)
      - TELEMETRY_ENABLED=${TELEMETRY_ENABLED:-false}
      - TELEMETRY_SERVICE_NAME=${TELEMETRY_SERVICE_NAME:-go-template}
      - TELEMETRY_SERVICE_VERSION=${TELEMETRY_SERVICE_VERSION:-1.0.0}
      - OTLP_ENDPOINT=${OTLP_ENDPOINT:-jaeger:4318}
      - OTLP_INSECURE=${OTLP_INSECURE:-true}
      - TELEMETRY_SAMPLING_RATIO=${TELEMETRY_SAMPLING_RATIO:-1.0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - go-template-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: go-template-postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-go-template}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-go-template}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - go-template-network

  redis:
    image: redis:7-alpine
    container_name: go-template-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - go-template-network

  # Observability services (optional - enable via profiles)
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: go-template-jaeger
    profiles:
      - observability
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
    networks:
      - go-template-network

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: go-template-prometheus
    profiles:
      - observability
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - go-template-network

  grafana:
    image: grafana/grafana:10.2.2
    container_name: go-template-grafana
    profiles:
      - observability
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - go-template-network

volumes:
  postgres_data:
    name: go-template-postgres-data
  redis_data:
    name: go-template-redis-data
  prometheus_data:
    name: go-template-prometheus-data
  grafana_data:
    name: go-template-grafana-data

networks:
  go-template-network:
    name: go-template-network
    driver: bridge
